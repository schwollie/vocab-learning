# HTTPS via Caddy. Usage:
#   docker compose -f docker-compose.yml -f docker-compose.https.yml up -d --build
#
# Requires PUBLIC_DOMAIN in .env (e.g. 159-195-38-197.sslip.io) and ports 80/443 open.

services:
  app:
    ports: []

  caddy:
    image: caddy:2-alpine
    container_name: vocab-caddy
    restart: always
    env_file:
      - .env
    environment:
      PUBLIC_DOMAIN: ${PUBLIC_DOMAIN:?Set PUBLIC_DOMAIN in .env}
      ACME_EMAIL: ${ACME_EMAIL:-}
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app
    networks:
      - vocab-network

volumes:
  caddy_data:
  caddy_config:
